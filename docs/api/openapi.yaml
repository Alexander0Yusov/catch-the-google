openapi: 3.0.3
info:
  title: Catch The Google HTTP API
  version: 1.0.0
  description: |
    Минимальный HTTP API для backend-сервиса.
    Игровой протокол реализован через WebSocket, не через REST.
servers:
  - url: https://catch-the-google-backend.onrender.com
paths:
  /health:
    get:
      summary: Health check
      description: Проверка, что backend-сервис жив и принимает трафик.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  service:
                    type: string
                    example: catch-the-google-backend
