asyncapi: 3.0.0
info:
  title: Catch The Google WebSocket API
  version: 1.0.0
  description: |
    Основной игровой протокол в проекте реализован через WebSocket.
    Это более корректный формат документации, чем Swagger/OpenAPI для realtime-сообщений.
servers:
  production:
    host: catch-the-google-backend.onrender.com
    protocol: wss
    pathname: /
channels:
  gameMessages:
    address: /
    messages:
      clientRequest:
        $ref: '#/components/messages/ClientRequest'
      serverResponse:
        $ref: '#/components/messages/ServerResponse'
      serverEvent:
        $ref: '#/components/messages/ServerEvent'
operations:
  sendRequest:
    action: send
    channel:
      $ref: '#/channels/gameMessages'
    messages:
      - $ref: '#/channels/gameMessages/messages/clientRequest'
  receiveResponse:
    action: receive
    channel:
      $ref: '#/channels/gameMessages'
    messages:
      - $ref: '#/channels/gameMessages/messages/serverResponse'
  receiveEvent:
    action: receive
    channel:
      $ref: '#/channels/gameMessages'
    messages:
      - $ref: '#/channels/gameMessages/messages/serverEvent'
components:
  messages:
    ClientRequest:
      payload:
        type: object
        properties:
          type:
            type: string
            enum: [request]
          requestId:
            type: string
          procedure:
            type: string
            description: |
              Примеры: joinGame, start, stop, setSettings, getSnapshot,
              movePlayer1Up, movePlayer2Left.
          payload:
            type: object
            nullable: true
    ServerResponse:
      payload:
        type: object
        properties:
          type:
            type: string
            enum: [response]
          requestId:
            type: string
          procedure:
            type: string
          result:
            type: object
            nullable: true
          error:
            type: string
            nullable: true
    ServerEvent:
      payload:
        type: object
        properties:
          type:
            type: string
            enum: [event]
          eventName:
            type: string
            enum: [change, googleCaught, finished]
          data:
            type: object
